<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10問ステップアップ式 プロジェクトマネジメント用語クイズ(全100問)</title>
    <style>
        :root {
            --primary-color: #2b6cb0;
            --primary-hover: #2c5282;
            --bg-color: #f7fafc;
            --card-bg: #ffffff;
            --text-color: #2d3748;
            --success-bg: #c6f6d5;
            --success-border: #38a169;
            --success-text: #22543d;
            --error-bg: #fed7d7;
            --error-border: #e53e3e;
            --error-text: #742a2a;
            --border-color: #e2e8f0;
        }
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            margin-bottom: 20px;
            padding: 15px;
            background: var(--primary-color);
            color: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 { margin: 0; font-size: 20px; }
        .status-bar {
            text-align: center;
            font-weight: bold;
            margin-bottom: 20px;
            color: var(--primary-color);
        }
        .quiz-card, .result-card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 25px;
            border: 1px solid var(--border-color);
        }
        .result-card { display: none; text-align: center; }
        .question-num {
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 10px;
            font-size: 14px;
        }
        .question-text {
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 20px;
            padding: 20px;
            background: #ebf8ff;
            border-radius: 6px;
            border-left: 5px solid var(--primary-color);
            line-height: 1.8;
        }
        .options-list { list-style: none; padding: 0; margin: 0; }
        .option-item { margin-bottom: 12px; }
        .option-btn {
            width: 100%; text-align: left; padding: 14px 20px;
            background: #fff; border: 2px solid var(--border-color);
            border-radius: 6px; font-size: 16px; cursor: pointer;
            transition: all 0.2s ease; color: var(--text-color); font-weight: bold;
        }
        .option-btn:hover:not(:disabled) { background: #ebf8ff; border-color: var(--primary-color); }
        .option-btn:disabled { cursor: not-allowed; }
        .option-btn.correct {
            background: var(--success-bg) !important; border-color: var(--success-border) !important;
            color: var(--success-text);
        }
        .option-btn.wrong {
            background: var(--error-bg) !important; border-color: var(--error-border) !important;
            color: var(--error-text);
        }
        .explanation-box {
            display: none; margin-top: 20px; padding: 15px 20px;
            border-radius: 6px; background: #edf2f7; border-left: 5px solid #4a5568; font-size: 15px;
        }
        .explanation-title { font-weight: bold; margin-bottom: 5px; color: #2d3748; }
        .nav-buttons { display: flex; justify-content: flex-end; margin-top: 20px; gap: 10px; }
        .action-btn {
            padding: 12px 20px; background: var(--primary-color); color: white;
            border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer;
        }
        .action-btn:hover { background: var(--primary-hover); }
        .action-btn:disabled { background: #cbd5e0; cursor: not-allowed; }
        .action-btn.secondary { background: #718096; }
        .action-btn.secondary:hover { background: #4a5568; }
        .score-display { font-size: 32px; font-weight: bold; color: var(--primary-color); margin: 20px 0; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>📊 10問ステップアップ式 用語クイズ(全100問)</h1>
    </header>

    <div class="status-bar" id="statusBar">セット 1 / 全セット</div>

    <div id="quizContainer" class="quiz-card">
        <div id="qNum" class="question-num"></div>
        <div class="question-text">
            次の意味を示す用語として、正しいものを選んでください。<br><br>
            <span id="qDef" style="color:#2d3748; font-weight: normal;"></span>
        </div>
        <ul class="options-list" id="optionsList"></ul>
        
        <div class="explanation-box" id="explanationBox">
            <div class="explanation-title">💡 正解と解説</div>
            <div id="explanationText"></div>
        </div>

        <div class="nav-buttons">
            <button class="action-btn" id="nextBtn" disabled onclick="handleNext()">次の問題へ</button>
        </div>
    </div>

    <div id="resultContainer" class="result-card">
        <h2>この10問セットの結果</h2>
        <div class="score-display" id="scoreDisplay"></div>
        <p id="resultMessage" style="margin-bottom: 25px;"></p>
        <div style="display: flex; justify-content: center; gap: 15px;">
            <button class="action-btn secondary" onclick="retryBatch()">この10問をもう一度挑戦</button>
            <button class="action-btn" id="nextBatchBtn" onclick="nextBatch()">次のセットへ進む</button>
        </div>
    </div>
</div>

<script>
// 全100問の用語集データ
const glossary = [
    { term: "PMBOK", def: "Project Management Body of Knowledge。米国 PMIが体系化したプロジェクトマネジメントの知識体系。世界標準として広く参照される。" },
    { term: "PMBOK6", def: "PMBOK第6版。5つのプロセス群・10の知識エリア・49のプロセスを軸とした、プロセス中心の体系。" },
    { term: "PMBOK7", def: "PMBOK第7版。プロセス中心から原則中心へ転換し、12のプロジェクト原則と8つのパフォーマンスドメインで構成される。" },
    { term: "共通フレーム 2013", def: "IPAが策定した、ソフトウェアの企画から開発・運用・保守・廃棄までの作業項目を共通の物差しで定義した日本の標準。発注者と受注者の認識齟齬を防ぐ。" },
    { term: "テーラリング", def: "標準のプロセスや手法を、プロジェクトの規模・特性・環境に合わせて取捨選択・調整すること。" },
    { term: "プロジェクト", def: "独自の成果物やサービスを創出するために実施される、有期性(始まりと終わりがある)の業務。" },
    { term: "プロジェクトマネジメント", def: "プロジェクトの要求事項を満たすために、知識・スキル・ツール・技法を諸活動へ適用すること。" },
    { term: "PM: プロジェクトマネジャー", def: "プロジェクトの目標達成に責任を持ち、計画・実行・統制を主導する責任者。" },
    { term: "PMI", def: "Project Management Institute。プロジェクトマネジメントの普及・標準化を担う米国の非営利団体。PMBOKやPMP 資格を提供。" },
    { term: "リーダーシップ", def: "チームを目標に向けて動機づけ、方向性を示し、まとめあげる影響力・指導力。" },
    { term: "動機付け", def: "メンバーが自発的に業務へ取り組むよう、内的・外的要因を通じて意欲を高めること。" },
    { term: "コンフリクト管理", def: "利害・意見の対立(コンフリクト)を認識し、建設的に解消・調整するマネジメント活動。" },
    { term: "ステークホルダー", def: "プロジェクトの意思決定・活動・成果から影響を受ける、あるいは影響を及ぼす利害関係者。" },
    { term: "ウォーターフォール開発", def: "要件定義・設計・実装・テストなどの工程を上流から下流へ順番に進める開発手法。" },
    { term: "アジャイル開発", def: "短い反復(イテレーション)を繰り返し、変化に柔軟に対応しながら段階的に開発を進める手法。" },
    { term: "プロトタイピング", def: "試作品(プロトタイプ)を早期に作成し、要求の確認や検証を行いながら開発を進める手法。" },
    { term: "スポンサー", def: "プロジェクトに資金やリソースを提供し、組織的な支援と意思決定の後ろ盾を担う立場の人。" },
    { term: "リスク", def: "発生すると目標に影響を与える不確実な事象や状態。マイナス(脅威)とプラス(好機)の両面がある。" },
    { term: "OPM", def: "Organizational Project Management。組織戦略を、プロジェクト・プログラム・ポートフォリオの管理を通じて遂行する統合的な枠組み。" },
    { term: "プログラムマネジメント", def: "相互に関連する複数のプロジェクトを束ねて統合管理し、個別では得られない便益を実現する管理。" },
    { term: "ポートフォリオマネジメント", def: "組織戦略の達成に向け、プロジェクトやプログラム群を選定・優先順位付け・最適配分する管理。" },
    { term: "成果物(デリバラブル)", def: "プロセスやフェーズ、プロジェクトを完了するために生成される、検証可能な製品・サービス・結果。" },
    { term: "制約条件", def: "コスト・スケジュール・スコープ・品質・資源・リスクなど、プロジェクトの選択肢を限定する要因。" },
    { term: "前提条件", def: "計画策定時に証明なしで真とみなす事項。誤ればリスクとなるため明示・管理する。" },
    { term: "トリプルコンストレイント", def: "スコープ・コスト・時間(および品質)が相互に影響し合う制約関係。一つを変えれば他に波及する。" },
    { term: "ファシリテーション", def: "会議やワークショップで参加者の合意形成や創発を中立的に促進する技法。" },
    { term: "交渉", def: "利害の異なる当事者間で合意に至るよう調整するスキル。調達やコンフリクト解決で重要。" },
    { term: "チームビルディング", def: "メンバー間の信頼と協働を高め、チームの一体感とパフォーマンスを向上させる活動。" },
    { term: "5つのプロセス群", def: "立ち上げ・計画・実行・監視コントロール・終結の5つ。プロジェクトを構成するプロセスの分類(PMBOK6)。" },
    { term: "立ち上げプロセス", def: "プロジェクトやフェーズの開始を正式に承認し、立ち上げるためのプロセス群。" },
    { term: "プロジェクト憲章", def: "プロジェクトの存在を公式に認可し、PMに権限を与える文書。目的・概要・主要関係者などを記載。" },
    { term: "ステークホルダーリスト", def: "プロジェクトに関わる利害関係者を洗い出し、その役割・関心・影響度などを整理した一覧。" },
    { term: "マイルストン", def: "プロジェクトにおける重要な節目や到達点。期間を持たず、特定の時点を表す。" },
    { term: "ステークホルダー 権力/関心度グリッド", def: "ステークホルダーを「権力(影響力)」と「関心度」の2軸で分類し、関与方針を検討する分析手法。" },
    { term: "計画プロセス", def: "プロジェクトの目標達成に向けたスコープ・スケジュール・コストなどの計画を策定するプロセス群。" },
    { term: "スコープ", def: "プロジェクトで実施する作業の範囲、および成果物に含まれる機能や要素の範囲。" },
    { term: "WBS", def: "Work Breakdown Structure。成果物や作業を階層的に分解し、管理可能な単位へ細分化化した構造図。" },
    { term: "アクティビティ", def: "WBSの最下層であるワークパッケージを構成する、スケジュール上の個々の作業要素。" },
    { term: "ガントチャート", def: "作業項目を縦軸、時間を横軸にとり、各作業の期間や進捗を横棒で示す日程表。" },
    { term: "クリティカルパス", def: "プロジェクト全体の所要期間を決定づける、最も余裕のない一連の作業経路。遅れが全体遅延に直結する。" },
    { term: "PERT", def: "Program Evaluation and Review Technique。作業の前後関係と所要時間から、日程や所要期間を分析する手法。楽観・最可能・悲観の3点見積もりを用いる。" },
    { term: "フロート", def: "作業の余裕時間(スラック)。全体スケジュールに影響を与えずに遅らせられる時間の幅。" },
    { term: "クラッシング", def: "資源を追加投入してクリティカルパス上の作業を短縮し、工期を圧縮する日程短縮技法。" },
    { term: "類推見積もり", def: "過去の類似プロジェクトの実績を基に、規模・コスト・期間を概算する見積もり手法。" },
    { term: "QC", def: "Quality Control(品質管理)。成果物が品質基準を満たしているかを検査・測定し、是正する活動。" },
    { term: "リスク評価 確率影響マトリックス", def: "リスクを「発生確率」と「影響度」の2軸で評価し、優先的に対応すべきリスクを特定する手法。" },
    { term: "マイナスリスク回避 転嫁 軽減 受容", def: "脅威(マイナスリスク)への対応戦略。発生要因を取り除く回避、第三者へ移す転嫁、影響を抑える軽減、あえて受け入れる受容。" },
    { term: "プラスリスク 活用 共有強化受容", def: "好機(プラスリスク)への対応戦略。確実に取りに行く活用、他者と組む共有、発生確率や効果を高める強化、自然に任せる受容。" },
    { term: "請負契約", def: "成果物の完成を約束し、その完成に対して報酬を支払う契約。受注者が完成責任を負う。" },
    { term: "準委任契約", def: "成果物の完成ではなく、業務の遂行(労務の提供)を目的とする契約。完成責任を負わない。" },
    { term: "派遣契約", def: "派遣元の労働者が派遣先の指揮命令下で業務に従事する契約。指揮命令権は派遣先にある。" },
    { term: "プロジェクトマネジメント計画書", def: "各知識エリアの補助計画やベースラインを統合した、プロジェクト遂行の総合的な計画文書。" },
    { term: "ベースライン", def: "スコープ・スケジュール・コストの承認済み基準値。実績と比較して差異を測る基準となる。" },
    { term: "スコープベースライン", def: "承認されたスコープ記述書・WBS・WBS 辞書から成る、スコープ管理の基準。" },
    { term: "ワークパッケージ", def: "WBSの最下位の構成要素。コストや所要期間を見積もり・管理できる最小単位の成果物。" },
    { term: "デシジョンツリー分析", def: "不確実な事象の確率と結果を枝分かれで表し、期待値から最適な選択肢を評価する手法。" },
    { term: "モンテカルロ分析", def: "乱数による多数回シミュレーションで、スケジュールやコストの達成確率を定量評価する手法。" },
    { term: "ボトムアップ見積もり", def: "WBSの下位要素ごとに見積もり、積み上げて全体を算出する精度の高い見積もり手法。" },
    { term: "パラメトリック見積もり", def: "過去データと変数の統計的関係(単価×数量など)を用いて算出する見積もり手法。" },
    { term: "予備設定分析(コンティンジェンシー予備)", def: "既知リスクに備えコスト・スケジュールに組み込む予備。マネジメント予備は未知リスク用。" },
    { term: "コミュニケーションマネジメント計画", def: "誰に・何を・いつ・どの手段で情報伝達するかを定めた計画。チャネル数は n(n-1)/2 で増加する。" },
    { term: "資源マネジメント", def: "プロジェクトに必要な人的資源と物的資源を見積もり・取得・育成・管理する知識エリア。" },
    { term: "RACI チャート", def: "作業ごとの責任分担を実行(R)・説明責任(A)・相談(C)・報告(Ⅰ)で示す責任分担マトリックス。" },
    { term: "調達マネジメント", def: "外部から製品・サービスを取得するための計画・実行・管理を扱う知識エリア。契約形態の選定を含む。" },
    { term: "実行プロセス", def: "計画に基づき、人的資源やリソースを動員して作業を実施し、成果物を作り上げるプロセス群。" },
    { term: "形式知", def: "文書・図表・マニュアルなど、言語化・体系化されて共有・伝達が可能な知識。" },
    { term: "暗黙知", def: "経験や勘など、言語化が難しく個人に蓄積された主観的・身体的な知識。" },
    { term: "タックマンモデル", def: "チームの発達段階を、形成期・混乱期・統一期・機能期(・散会期)の段階で説明するモデル。" },
    { term: "コンフリクト 撤退/回避 鎮静/適応妥協/和解強制/指示協調/解決", def: "対立への対処スタイル。問題から離れる撤退/回避、相手に譲る鎮静/適応、互いに譲歩する妥協/和解、力で押し通す強制/指示、双方が満足する解を探る協調/解決。" },
    { term: "RFI", def: "Request For Information (情報提供依頼書)。発注者がベンダーに製品・サービスの情報提供を求める文書。" },
    { term: "RFP", def: "Request For Proposal (提案依頼書)。発注者がベンダーに具体的な提案や見積もりを求める文書。" },
    { term: "品質保証(QA)", def: "プロセスが品質基準を満たすよう監査・改善し、品質に対する信頼を確立する活動。QCと対をなす。" },
    { term: "監視コントロールプロセス", def: "プロジェクトの進捗や成果を監視・測定し、計画との差異を是正するプロセス群。" },
    { term: "PDCA", def: "Plan(計画)・Do(実行)・Check(評価)・Act(改善)のサイクルで継続的に業務を改善する管理手法。" },
    { term: "CCB:Change Control Board", def: "変更管理委員会。プロジェクトの変更要求を審査し、承認・却下を判断する組織。" },
    { term: "スコープクリープ", def: "正式な変更管理を経ずに、スコープが徐々に拡大していく好ましくない状態。" },
    { term: "EVM", def: "Earned Value Management。出来高(アーンドバリュー)を用いてコストとスケジュールの進捗を定量的に管理する手法。" },
    { term: "終結プロセス", def: "プロジェクトやフェーズを正式に完了・終了させ、成果物の引き渡しや教訓の整理を行うプロセス群。" },
    { term: "10の知識エリア", def: "統合・スコープ・スケジュール・コスト・品質・資源・コミュニケーション・リスク・調達・ステークホルダーの各管理領域(PMBOK6)。" },
    { term: "49 のプロセス", def: "PMBOK6 において、5つのプロセス群と10の知識エリアの組み合わせで定義される管理プロセスの総数。" },
    { term: "12のプロジェクト原則", def: "PMBOK7 で示された、プロジェクト運営の指針となる原則。スチュワードシップやチーム、価値などを含む。" },
    { term: "スチュワードシップ", def: "誠実・敬意・配慮をもって、組織内外に対し責任ある管理者として振る舞うこと。PMBOK7の原則の一つ。" },
    { term: "システム思考", def: "プロジェクトを相互に関連し合う要素の集合(システム)として捉え、全体最適の視点で扱う考え方。" },
    { term: "8つのパフォーマンスドメイン", def: "PMBOK7 で価値を生み出すために重要な活動領域。ステークホルダー・チーム・開発アプローチ・計画・プロジェクト作業・デリバリー・測定・不確実性。" },
    { term: "価値(バリュー)", def: "PMBOK7 が中核に据える概念。成果物そのものより、利害関係者にもたらす便益・成果を重視する。" },
    { term: "テーラリング (PMBOK7)", def: "プロジェクトの状況に応じてアプローチ・手法・成果物を適応的に選択・調整する原則。" },
    { term: "プロジェクトマネジメント標準", def: "PMBOK7 の前半を成す、価値提供システムと12の原則を定義した中核部分。" },
    { term: "適応型(アダプティブ)", def: "要求が流動的な状況で反復・漸進により柔軟に進める開発アプローチ。アジャイル等を含む。" },
    { term: "予測型(プレディクティブ)", def: "要求が明確で安定した状況で、計画を前もって固めて進める開発アプローチ。" },
    { term: "ハイブリッド", def: "予測型と適応型を組み合わせ、プロジェクトの特性に応じて使い分ける開発アプローチ。" },
    { term: "SIer", def: "System Integrator。情報システムの企画・構築・運用を一括して請け負う事業者。" },
    { term: "CIO", def: "Chief Information Officer(最高情報責任者)。経営の視点から情報システム戦略を統括する役職。" },
    { term: "ユーザー企業", def: "情報システムを発注・利用する側の企業。SIerなどの提供側(ベンダー)と対になる立場。" },
    { term: "多段階見積もり", def: "プロジェクトの進行に応じて段階的に精度を高めながら見積もりを行う方法。超上流では概算、詳細化に伴い精緻化する。" },
    { term: "IPA", def: "情報処理推進機構。日本のIT政策を支える独立行政法人。共通フレームや各種ガイドライン、情報処理技術者試験を所管。" },
    { term: "ソフトウェアライフサイクル", def: "ソフトウェアの企画・要件定義・開発・運用・保守・廃棄に至る一連の工程と期間。" },
    { term: "超上流", def: "要件定義より前の、企画・経営戦略との整合や全体構想を固める最上流の工程。プロジェクトの成否を大きく左右する。" },
    { term: "PMO", def: "Project Management Office。組織内のプロジェクトマネジメントを横断的に支援・標準化・統制する部門。" },
    { term: "要件定義", def: "システム化の対象業務と利用者の要求を明確化し、満たすべき機能・非機能を定義する工程。" },
    { term: "非機能要件", def: "性能・信頼性・セキュリティ・運用性など、機能以外でシステムが満たすべき品質特性の要求。" }
];

const BATCH_SIZE = 10;
let currentBatchIndex = 0;
let currentQuestionIndex = 0;
let score = 0;
let currentBatchQuestions = [];

const totalBatches = Math.ceil(glossary.length / BATCH_SIZE);

// 10問セットの準備
function startBatch(batchIndex) {
    currentBatchIndex = batchIndex;
    currentQuestionIndex = 0;
    score = 0;
    
    document.getElementById('statusBar').innerText = `セット ${batchIndex + 1} / 全 ${totalBatches} セット`;
    document.getElementById('resultContainer').style.display = 'none';
    document.getElementById('quizContainer').style.display = 'block';

    const startIndex = batchIndex * BATCH_SIZE;
    const batchItems = glossary.slice(startIndex, startIndex + BATCH_SIZE);
    
    if (batchItems.length === 0) {
        alert("すべての問題が終了しました！お疲れ様でした。");
        return;
    }

    // 選択肢（ダミー用語3つ＋正解の用語1つ）を生成
    currentBatchQuestions = batchItems.map(item => {
        // 正解以外の「用語（term）」を抽出してシャッフル
        let wrongTerms = glossary.filter(g => g.term !== item.term).map(g => g.term);
        wrongTerms.sort(() => 0.5 - Math.random()); 
        
        // 4択の選択肢を作成し、シャッフル
        let options = [item.term, wrongTerms[0], wrongTerms[1], wrongTerms[2]];
        options.sort(() => 0.5 - Math.random()); 
        
        return { 
            term: item.term, 
            def: item.def, 
            options: options, 
            correctIndex: options.indexOf(item.term) 
        };
    });

    loadQuestion();
}

function loadQuestion() {
    const q = currentBatchQuestions[currentQuestionIndex];
    document.getElementById('qNum').innerText = `第 ${currentQuestionIndex + 1} 問 / 全 ${currentBatchQuestions.length} 問 (セット ${currentBatchIndex + 1})`;
    
    // 問題文に「意味（定義）」を表示
    document.getElementById('qDef').innerText = q.def;
    
    const optionsList = document.getElementById('optionsList');
    optionsList.innerHTML = '';
    
    // 選択肢に「用語」を表示
    q.options.forEach((opt, index) => {
        const li = document.createElement('li');
        li.className = 'option-item';
        li.innerHTML = `<button class="option-btn" onclick="selectOption(this, ${index}, ${q.correctIndex}, '${q.term}')">${index + 1}. ${opt}</button>`;
        optionsList.appendChild(li);
    });

    document.getElementById('explanationBox').style.display = 'none';
    
    const nextBtn = document.getElementById('nextBtn');
    nextBtn.innerText = (currentQuestionIndex === currentBatchQuestions.length - 1) ? '結果を見る' : '次の問題へ';
    nextBtn.disabled = true;
}

function selectOption(btn, selectedIndex, correctIndex, exactTerm) {
    const buttons = document.querySelectorAll('.option-btn');
    buttons.forEach((b, i) => {
        b.disabled = true;
        if (i === correctIndex) b.classList.add('correct');
    });

    if (selectedIndex === correctIndex) {
        score++;
    } else {
        btn.classList.add('wrong');
    }

    // 解説に正解の用語を表示
    document.getElementById('explanationText').innerHTML = `正解は <strong>【 ${exactTerm} 】</strong> です。`;
    document.getElementById('explanationBox').style.display = 'block';
    document.getElementById('nextBtn').disabled = false;
}

function handleNext() {
    if (currentQuestionIndex < currentBatchQuestions.length - 1) {
        currentQuestionIndex++;
        loadQuestion();
    } else {
        showBatchResult();
    }
}

function showBatchResult() {
    document.getElementById('quizContainer').style.display = 'none';
    const resContainer = document.getElementById('resultContainer');
    resContainer.style.display = 'block';
    
    document.getElementById('scoreDisplay').innerText = `${score} / ${currentBatchQuestions.length} 問 正解！`;
    
    const msg = document.getElementById('resultMessage');
    if (score === currentBatchQuestions.length) {
        msg.innerText = "全問正解です！素晴らしい！この調子で次のセットも頑張りましょう。";
    } else {
        msg.innerText = "間違えた問題がありました。用語を確実に覚えるために、このセットを再挑戦することをお勧めします！";
    }

    const nextBatchBtn = document.getElementById('nextBatchBtn');
    if (currentBatchIndex >= totalBatches - 1) {
        nextBatchBtn.innerText = "すべての学習を完了する";
        nextBatchBtn.onclick = () => {
            alert("全100問(10セット)の学習、本当にお疲れ様でした！試験本番、自信を持って臨んでくださいね！");
            location.reload(); // 最初からやり直す
        };
    } else {
        nextBatchBtn.innerText = "次のセットへ進む";
        nextBatchBtn.onclick = nextBatch;
    }
}

function retryBatch() {
    startBatch(currentBatchIndex);
}

function nextBatch() {
    startBatch(currentBatchIndex + 1);
}

// 初期起動
startBatch(0);
</script>
